<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aidan Seigler — Data &amp; Systems</title>
  <meta name="description" content="Aidan Seigler — Information Technology & Systems graduate from UT Dallas. SQL, Python, and IT systems work, with 3,000+ tickets shipped and a 90% device-setup speedup." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "#7cf0c5",
      "showGrid": true,
      "monoBrand": true
    }/*EDITMODE-END*/;

    const ACCENT_OPTIONS = ['#7cf0c5', '#f4a261', '#a78bfa', '#7dd3fc', '#f472b6'];

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.dataset.theme = t.theme;
        document.documentElement.style.setProperty('--accent', t.accent);
        // Derive glow color from accent
        const glow = t.accent + '2e';
        document.documentElement.style.setProperty('--accent-glow', glow);
        document.querySelector('.grid-bg').style.display = t.showGrid ? 'block' : 'none';
      }, [t.theme, t.accent, t.showGrid]);

      // Reveal-on-scroll
      React.useEffect(() => {
        const els = document.querySelectorAll('section, .hero');
        els.forEach(el => el.classList.add('reveal'));
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.08 });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);

      return (
        <React.Fragment>
          <Nav />
          <main>
            <Hero />
            <About />
            <Experience />
            <Skills />
            <Projects />
            <Contact />
          </main>
          <Footer />

          <TweaksPanel>
            <TweakSection label="Theme" />
            <TweakRadio
              label="Mode"
              value={t.theme}
              options={['dark','light']}
              onChange={(v) => setTweak('theme', v)}
            />
            <TweakColor
              label="Accent"
              value={t.accent}
              options={ACCENT_OPTIONS}
              onChange={(v) => setTweak('accent', v)}
            />
            <TweakSection label="Layout" />
            <TweakToggle
              label="Grid backdrop"
              value={t.showGrid}
              onChange={(v) => setTweak('showGrid', v)}
            />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
